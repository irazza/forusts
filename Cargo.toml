[package]
name = "ftsd"
version = "0.0.1"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
rand = "0.8.5"
csv = "1.3.0"
rayon = "1.8.0"
hashbrown = { version = "0.14.1", features = ["serde"] }
parking_lot = "0.12.1"
serde_json = "1.0.108"

[build]
rustflags = ["-C", "target-cpu=native"]

[profile.release]
debug = true
codegen-units = 1
lto = "fat"
panic = "abort"
